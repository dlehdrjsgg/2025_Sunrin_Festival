<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2025 Sunrin Festival</title>
    <link rel="icon" type="image/x-icon" href="favicon.ico">
    <link rel="stylesheet" href="assets/css/styles.css">
    <style>
        .public-scoreboard {
            background: #0a0a0a;
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .public-container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(20px);
        }
        
        .public-header {
            text-align: center;
            margin-bottom: 60px;
            position: relative;
        }
        
        .public-header h1 {
            font-size: 1rem;
            font-weight: 500;
            color: #888;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
        }
        
        .public-header h2 {
            font-size: 4rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }
        
        .public-header .subtitle {
            font-size: 1.2rem;
            color: #888;
            font-weight: 400;
            font-style: italic;
        }
        
        .auto-refresh {
            text-align: center;
            margin-top: 30px;
            color: #888;
            font-size: 0.9rem;
        }
        
        .refresh-indicator {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #00ff88;
            border-radius: 50%;
            margin-right: 8px;
            animation: blink 2s infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="public-scoreboard">
        <div class="public-container">
            <div class="public-header">
                <h1><img src="assets/images/logo.png" alt="Layer7 로고" class="club-logo-inline"> Layer7</h1>
                <h2>2025 Sunrin Festival</h2>
                <p class="subtitle">"Time Attack : 꼬깔콘 그랑프리"</p>
            </div>

            
            <div class="scoreboard-container">
                <div class="scoreboard">
                    <div class="scoreboard-header">
                        <span>순위</span>
                        <span>정보</span>
                        <span>찾은 개수</span>
                    </div>
                    <div id="publicScoreboardList" class="scoreboard-list">
                    </div>
                </div>
                
            </div>
            
            <div class="game-description">
                <p>2-1반에서는 바닥에 숨겨진 레세 로고 딱지를 제한 시간 안에 꼬깔콘을 쓰고 찾아내는 게임을 진행합니다. 가장 많이 찾은 참가자는 스코어보드에 이름이 올라가며, 특별한 상품과 함께 폴라로이드 사진도 찍어드립니다.</p>
            </div>
        </div>
    </div>

    <script>
        // 서버에서 스코어보드 데이터 가져오기
        async function getScoreboard() {
            try {
                const response = await fetch('/api/scoreboard');
                if (!response.ok) {
                    throw new Error('스코어보드 로드 실패');
                }
                return await response.json();
            } catch (error) {
                console.error('스코어보드 로드 오류:', error);
                return [];
            }
        }
        
        // 공개용 스코어보드 업데이트 함수
        async function updatePublicScoreboard() {
            const scoreboard = await getScoreboard();
            
            if (scoreboard.length === 0) {
                document.getElementById('publicScoreboardList').innerHTML = '<div class="no-scores">아직 기록이 없습니다.</div>';
                return;
            }
            
            // 점수순으로 정렬 (내림차순)
            scoreboard.sort((a, b) => b.score - a.score);
            
            const scoreboardList = document.getElementById('publicScoreboardList');
            scoreboardList.innerHTML = '';
            
            scoreboard.forEach((entry, index) => {
                const item = document.createElement('div');
                item.className = 'scoreboard-item';
                
                // 상위 3명에게 특별한 스타일 적용
                if (index === 0) item.classList.add('rank-1');
                else if (index === 1) item.classList.add('rank-2');
                else if (index === 2) item.classList.add('rank-3');
                
                item.innerHTML = `
                    <span>${index + 1}위</span>
                    <span>${entry.studentId} ${entry.studentName}</span>
                    <span>${entry.score}</span>
                `;
                
                scoreboardList.appendChild(item);
            });
        }
        
        
            // 페이지 로드 시 스코어보드 초기화
            document.addEventListener('DOMContentLoaded', () => {
                updatePublicScoreboard();
            });
    </script>
</body>
</html>
